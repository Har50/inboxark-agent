services:
  - type: web
    name: inboxark-agent
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: IG_USER_ID
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_SECRET
        sync: false
